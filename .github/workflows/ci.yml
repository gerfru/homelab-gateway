name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c  # v3
        with:
          file_or_dir: "."
          config_file: .yamllint.yml

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # v2
        with:
          scandir: .

      - name: Hadolint (Dockerfile best practices)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3
        with:
          dockerfile: "Dockerfile"
          failure-threshold: warning
        if: hashFiles('Dockerfile') != ''

  docker-compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Create stub secret files for validation
        run: |
          mkdir -p secrets
          echo -n "ci-user" > secrets/gf_admin_user
          echo -n "ci-password" > secrets/gf_admin_password

      - name: Validate docker-compose.yml
        run: |
          TAILSCALE_IP=100.0.0.1 \
          DOMAIN=home.lab \
          ALERTING_WEBHOOK_URL=http://localhost:9999 \
          docker compose config --quiet

  # GitHub-native secret scanning is unavailable on free-tier private repos.
  # TruffleHog provides equivalent detection with verified/unverified filtering.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51  # v3.95.5
        with:
          extra_args: --results=verified,unknown

  caddyfile-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Generate Caddyfile from template
        run: DOMAIN=home.lab envsubst '$DOMAIN' < Caddyfile.tmpl > Caddyfile

      - name: Validate Caddyfile syntax
        env:
          CADDY_AUTH_USER: admin
          # nosemgrep: generic.secrets.security.detected-bcrypt-hash.detected-bcrypt-hash
          CADDY_AUTH_PASS_HASH: '$2a$14$0cs/bgKwnjlhTz5C52qJNeGRXaQFYs0ie0cdMgE5ybSTHiuDSaspy'
        run: |
          docker run --rm \
            -e CADDY_AUTH_USER \
            -e CADDY_AUTH_PASS_HASH \
            -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine \
            caddy validate --config /etc/caddy/Caddyfile

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - \
            https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] \
            https://aquasecurity.github.io/trivy-repo/deb \
            generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan container images
        # Informational — upstream base images often ship with unfixed CVEs.
        # Findings appear as PR annotations but do not block merge.
        continue-on-error: true
        run: |
          set -euo pipefail
          FAILED=0
          while read -r img; do
            echo "::group::Scanning: $img"
            if ! trivy image \
              --severity CRITICAL,HIGH \
              --ignore-unfixed \
              --scanners vuln \
              --exit-code 1 \
              "$img"; then
              FAILED=1
            fi
            echo "::endgroup::"
          done < <(grep 'image:' docker-compose.yml | awk '{print $2}' | sort -u)
          if [ "$FAILED" -ne 0 ]; then
            echo "::warning::Trivy found CRITICAL or HIGH vulnerabilities in upstream images"
            exit 1
          fi
          echo "Trivy scan complete — no CRITICAL or HIGH vulnerabilities found"

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:207983631beecdbe7fa29196c7f4a7a5f29033933cdb76c687ce4a672e07618d
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Run Semgrep
        run: semgrep scan --config auto --error --severity ERROR

  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@dfb51aed1b783289b0d3f255028e7a88d5e8caa1  # v12
        with:
          directory: .
          quiet: true
          soft_fail: false
          # CKV2_GHA_1: False positive — workflow permissions are explicitly
          # restricted to "contents: read" (line 9-10), not "write-all".
          skip_check: CKV2_GHA_1

  test-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Run template generation tests
        run: bash tests/test-generate.sh

      - name: Run PII regex tests
        run: bash tests/test-pii-regex.sh
