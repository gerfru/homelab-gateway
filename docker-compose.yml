services:
  # On Linux: CoreDNS runs in Docker with host networking (binds to Tailscale IP)
  # On macOS: CoreDNS runs natively via brew (Docker can't bind Tailscale utun0)
  # Use `make up` which auto-detects the OS
  coredns:
    image: coredns/coredns:1.14.4@sha256:3e98f280fd601b37411c5fb7075fd9f337833c480f1644970b727ae0af067782
    container_name: gateway-dns
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    volumes:
      - ./dns/Corefile:/etc/coredns/Corefile:ro
      - ./dns/home.lab.zone:/etc/coredns/home.lab.zone:ro
    command: ["-conf", "/etc/coredns/Corefile"]
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.10'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    profiles:
      - linux

  caddy:
    image: caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    container_name: gateway-caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${TAILSCALE_IP}:443:443"
    environment:
      - CADDY_AUTH_USER=${CADDY_AUTH_USER:-}
      - CADDY_AUTH_PASS_HASH=${CADDY_AUTH_PASS_HASH:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2019/config/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Monitoring (centralized for all projects) ---

  loki:
    image: grafana/loki:3.7.2@sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86
    container_name: gateway-loki
    restart: unless-stopped
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - monitoring
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    # Loki 3.7.2 is distroless (no shell, no wget) — health check not possible via exec.
    # Rely on depends_on + start_period for downstream services instead.
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: gateway-socket-proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run
      - /tmp
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 32m
          cpus: '0.05'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  promtail:
    image: grafana/promtail:3.6.11@sha256:a761cb834cfaeee29745440d4884d6748f0a08d8f68928db1d707018c1dcfbe9
    container_name: gateway-promtail
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      socket-proxy:
        condition: service_healthy
      loki:
        condition: service_started
    networks:
      - monitoring
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    # Promtail 3.0.0 is distroless (no shell, no wget) — health check not possible via exec.
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.10'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    image: grafana/grafana:13.0.2@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
    container_name: gateway-grafana
    restart: unless-stopped
    user: "472:0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://logs.${DOMAIN}
      - ALERTING_WEBHOOK_URL=${ALERTING_WEBHOOK_URL:-http://localhost:9999}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_started
    networks:
      - proxy
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # --- Metrics (system monitoring) ---

  node-exporter:
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    container_name: gateway-node-exporter
    restart: unless-stopped
    pid: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+)($$|/)"
      - "--collector.filesystem.fs-types-exclude=^(fakeowner|virtiofs.*|fuse\\..+|selfowner|tmpfs|autofs|binfmt_misc|cgroup2?|configfs|debugfs|devpts|devtmpfs|erofs|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$"
    networks:
      - monitoring
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.10'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  tempo:
    image: grafana/tempo:2.7.2@sha256:9b89af53103f8ea7ee19e33951c82f826b8c873baf89cf04d49c69fed76b737e
    container_name: gateway-tempo
    restart: unless-stopped
    read_only: true
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./monitoring/tempo-config.yml:/etc/tempo/config.yml:ro
      - tempo-data:/var/tempo
    tmpfs:
      - /tmp
    command: ["-config.file=/etc/tempo/config.yml"]
    networks:
      - monitoring
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    container_name: gateway-prometheus
    restart: unless-stopped
    user: "65534:65534"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=500MB"
    depends_on:
      node-exporter:
        condition: service_healthy
    networks:
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  uptime-kuma:
    image: louislam/uptime-kuma:2@sha256:91e963bfda569ba115206e843febb446f473ab525add4e08b2b9e3beffa16985
    container_name: gateway-uptime
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - proxy
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "/app/extra/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # --- Deployment (auto-update with label opt-in) ---

  watchtower:
    image: containrrr/watchtower:1.7.1@sha256:f9086bfda061100361fc2bacf069585678d760d705cf390918ccdbda8a00980b
    container_name: gateway-watchtower
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.05'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  caddy_data:
  caddy_config:
  loki-data:
  grafana-data:
  prometheus-data:
  uptime-kuma-data:
  tempo-data:

networks:
  proxy:
    name: proxy
    driver: bridge
    # Caddy always runs in Docker — apps connect via this network
  monitoring:
    name: monitoring
    driver: bridge
