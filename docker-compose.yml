services:
  # On Linux: CoreDNS runs in Docker with host networking (binds to Tailscale IP)
  # On macOS: CoreDNS runs natively via brew (Docker can't bind Tailscale utun0)
  # Use `make up` which auto-detects the OS
  coredns:
    image: coredns/coredns:1.12.0
    container_name: gateway-dns
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./dns/Corefile:/etc/coredns/Corefile:ro
      - ./dns/home.lab.zone:/etc/coredns/home.lab.zone:ro
    command: ["-conf", "/etc/coredns/Corefile"]
    profiles:
      - linux

  caddy:
    image: caddy:2-alpine
    container_name: gateway-caddy
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy
    labels:
      - "monitoring=true"

  # --- Monitoring (centralized for all projects) ---

  loki:
    image: grafana/loki:3.0.0@sha256:757b5fadf816a1396f1fea598152947421fa49cb8b2db1ddd2a6e30fae003253
    container_name: gateway-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  promtail:
    image: grafana/promtail:3.0.0@sha256:d3de3da9431cfbe74a6a94555050df5257f357e827be8e63f8998d509c37af8b
    container_name: gateway-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.10'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: gateway-grafana
    restart: unless-stopped
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SERVER_ROOT_URL=https://logs.home.lab
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    networks:
      - proxy
      - monitoring
    labels:
      - "monitoring=true"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  uptime-kuma:
    image: louislam/uptime-kuma:1@sha256:3d632903e6af34139a37f18055c4f1bfd9b7205ae1138f1e5e8940ddc1d176f9
    container_name: gateway-uptime
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - proxy
      - monitoring
    labels:
      - "monitoring=true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  caddy_data:
  caddy_config:
  loki-data:
  grafana-data:
  uptime-kuma-data:

networks:
  proxy:
    name: proxy
    driver: bridge
    # Caddy always runs in Docker — apps connect via this network
  monitoring:
    name: monitoring
    driver: bridge
