services:
  # On Linux: CoreDNS runs in Docker with host networking (binds to Tailscale IP)
  # On macOS: CoreDNS runs natively via brew (Docker can't bind Tailscale utun0)
  # Use `make up` which auto-detects the OS
  coredns:
    image: coredns/coredns:1.14.4@sha256:3e98f280fd601b37411c5fb7075fd9f337833c480f1644970b727ae0af067782
    container_name: gateway-dns
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    volumes:
      - ./dns/Corefile:/etc/coredns/Corefile:ro
      - ./dns/home.lab.zone:/etc/coredns/home.lab.zone:ro
    command: ["-conf", "/etc/coredns/Corefile"]
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.10'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    profiles:
      - linux

  caddy:
    image: caddy:2.11-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    container_name: gateway-caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${TAILSCALE_IP}:443:443"
      - "${TAILSCALE_IP}:80:80"
    environment:
      - CADDY_AUTH_USER=${CADDY_AUTH_USER:-}
      - CADDY_AUTH_PASS_HASH=${CADDY_AUTH_PASS_HASH:-}
      - NILES_UPSTREAM=${NILES_UPSTREAM:-niles_core:8000}
      # API key for the internal :9101 Niles /metrics scrape (must equal Niles' NILES_API_KEY)
      - NILES_METRICS_API_KEY=${NILES_METRICS_API_KEY:-}
      - PULSEBASE_UPSTREAM=${PULSEBASE_UPSTREAM:-pulsebase-api:8000}
      - VIKUNJA_UPSTREAM=${VIKUNJA_UPSTREAM:-vikunja:3456}
      - WHATSAPP_UPSTREAM=${WHATSAPP_UPSTREAM:-evolution_api:8080}
      - UPTIME_UPSTREAM=${UPTIME_UPSTREAM:-gateway-uptime:3001}
      - GRAFANA_UPSTREAM=${GRAFANA_UPSTREAM:-gateway-grafana:3000}
      - PROMETHEUS_UPSTREAM=${PROMETHEUS_UPSTREAM:-prometheus:9090}
      - GITEA_UPSTREAM=${GITEA_UPSTREAM:-gitea:3000}
      - ARBSCANNER_UPSTREAM=${ARBSCANNER_UPSTREAM:-arbscanner:8000}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2019/config/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Arbitrage Scanner ---

  arbscanner:
    profiles: [arbscanner]
    build:
      context: ${ARBSCANNER_PATH:-../arbscanner}
    container_name: arbscanner
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # Writable store for the Settings page (rootfs is read-only).
      - arbscanner_data:/data
    environment:
      - LOG_FORMAT=json
      - WEB_ENABLED=true
      - WEB_PORT=8000
      - POLL_INTERVAL_SECONDS=${ARBSCANNER_POLL_INTERVAL:-30}
      - MIN_PROFIT_THRESHOLD=${ARBSCANNER_MIN_PROFIT:-0.02}
      - FUZZY_MATCH_THRESHOLD=${ARBSCANNER_FUZZY_THRESHOLD:-80}
      - KALSHI_API_KEY_ID_FILE=/run/secrets/kalshi_api_key_id
      - KALSHI_PRIVATE_KEY_PATH=/run/secrets/kalshi_private_key
    secrets:
      - kalshi_api_key_id
      - kalshi_private_key
    networks:
      - proxy
      - monitoring
    labels:
      - "monitoring=true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Monitoring (centralized for all projects) ---

  loki:
    image: grafana/loki:3.7.2@sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86
    container_name: gateway-loki
    restart: unless-stopped
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    command:
      - "-config.file=/etc/loki/local-config.yml"
    networks:
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    # Loki 3.7.2 is distroless (no shell, no wget) — health check not possible via exec.
    # Rely on depends_on + start_period for downstream services instead.
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: gateway-socket-proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /run
      - /tmp
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 32m
          cpus: '0.05'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  promtail:
    image: grafana/promtail:3.6.11@sha256:a761cb834cfaeee29745440d4884d6748f0a08d8f68928db1d707018c1dcfbe9
    container_name: gateway-promtail
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-positions:/promtail
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      socket-proxy:
        condition: service_healthy
      loki:
        condition: service_started
    networks:
      - monitoring
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    # Promtail 3.0.0 is distroless (no shell, no wget) — health check not possible via exec.
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.10'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    image: grafana/grafana:13.0.2@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
    container_name: gateway-grafana
    restart: unless-stopped
    user: "472:472"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_USER__FILE=/run/secrets/gf_admin_user
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/gf_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://logs.${DOMAIN}
      - ALERTING_WEBHOOK_URL=${ALERTING_WEBHOOK_URL:-http://localhost:9999}
    secrets:
      - gf_admin_user
      - gf_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_started
    networks:
      - proxy
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # --- Metrics (system monitoring) ---

  node-exporter:
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    container_name: gateway-node-exporter
    restart: unless-stopped
    # ACCEPTED RISK: Host PID namespace required for accurate process metrics.
    # Mitigations: read_only filesystem, cap_drop ALL, no-new-privileges.
    pid: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+)($$|/)"
      - "--collector.filesystem.fs-types-exclude=^(fakeowner|virtiofs.*|fuse\\..+|selfowner|tmpfs|autofs|binfmt_misc|cgroup2?|configfs|debugfs|devpts|devtmpfs|erofs|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$"
    networks:
      - monitoring
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.10'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # Tempo: distributed tracing — receives OTLP on gRPC (4317) and HTTP (4318)
  # Note: OTLP ports are container-internal only (not host-exposed).
  # To send traces, connect from the 'monitoring' Docker network.
  tempo:
    image: grafana/tempo:2.10.7@sha256:032b3acb51ed02c4b801473d54bb63e9e9f13738d215126d9843c30283794f4b
    container_name: gateway-tempo
    restart: unless-stopped
    read_only: true
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./monitoring/tempo-config.yml:/etc/tempo/config.yml:ro
      - tempo-data:/var/tempo
    tmpfs:
      - /tmp
    command: ["-config.file=/etc/tempo/config.yml"]
    networks:
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    # Tempo 2.x is distroless (no /bin/sh) — CMD-SHELL healthchecks fail.
    # Process liveness is ensured by restart: unless-stopped.
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    container_name: gateway-prometheus
    restart: unless-stopped
    user: "65534:65534"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}"
      - "--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-500MB}"
    depends_on:
      node-exporter:
        condition: service_healthy
    networks:
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  uptime-kuma:
    image: louislam/uptime-kuma:2@sha256:91e963bfda569ba115206e843febb446f473ab525add4e08b2b9e3beffa16985
    container_name: gateway-uptime
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # ACCEPTED RISK: SETGID/SETUID required for Uptime Kuma's internal
    # user-switch from root to non-root during startup.
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - proxy
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "/app/extra/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # --- Git hosting (Gitea + PostgreSQL) ---

  gitea-db:
    image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
    container_name: gateway-gitea-db
    restart: unless-stopped
    # ACCEPTED RISK: no-new-privileges not set — PostgreSQL entrypoint requires
    # gosu/su-exec to switch from root to postgres user, which needs setuid.
    # no-new-privileges blocks setuid transitions entirely.
    # Mitigations: read_only filesystem, cap_drop ALL + minimal cap_add,
    # monitoring network only (not reachable from outside), no ports exposed.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
      - DAC_READ_SEARCH
    read_only: true
    tmpfs:
      - /tmp
      - /run
    environment:
      - POSTGRES_DB=gitea
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD_FILE=/run/secrets/gitea_db_password
    secrets:
      - gitea_db_password
    volumes:
      - gitea-db-data:/var/lib/postgresql/data
    networks:
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  gitea:
    image: gitea/gitea:1.26@sha256:7d13848af12645600a5f9d93ee2560daa9c6fa6b5b859b7bff3a5e1c0b661031
    container_name: gateway-gitea
    restart: unless-stopped
    # ACCEPTED RISK: no-new-privileges not set, read_only not set.
    # Gitea entrypoint uses su-exec (setuid) for user switch and writes to
    # multiple subdirectories under /data at runtime.
    # Mitigations: cap_drop ALL + minimal cap_add, proxy + monitoring networks only.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
      - DAC_READ_SEARCH
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD__FILE=/run/secrets/gitea_db_password
      - GITEA__metrics__ENABLED=true
      - GITEA__server__ROOT_URL=https://gitea.${DOMAIN}
      - GITEA__server__SSH_DOMAIN=gitea.${DOMAIN}
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__mirror__ENABLED=true
      - GITEA__actions__ENABLED=true
    secrets:
      - gitea_db_password
      - gitea_admin_password
    volumes:
      - gitea-data:/data
      - gitea-repos:/data/git/repositories
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      gitea-db:
        condition: service_healthy
    networks:
      - proxy
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  act-runner:
    image: gitea/act_runner:0.2.11
    container_name: gateway-act-runner
    restart: unless-stopped
    # ACCEPTED RISK: Docker socket access required to spawn job containers.
    # Mitigations: cap_drop ALL, no-new-privileges, registration token via Docker secret.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      # Internal URL: no TLS, reachable from monitoring network directly.
      # Job containers also run on monitoring network (see act_runner_config.yaml).
      - GITEA_INSTANCE_URL=http://gitea:3000
      - GITEA_RUNNER_NAME=homelab-runner
      - GITEA_RUNNER_LABELS=ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:act-22.04
    secrets:
      - act_runner_token
    volumes:
      - act_runner_data:/data
      - ./monitoring/act_runner_config.yaml:/etc/act_runner/config.yaml:ro
      # Docker socket: required to launch job containers.
      # ACCEPTED RISK: grants equivalent-to-root access on the Docker host.
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint:
      - sh
      - -c
      - |
        if [ ! -f /data/.runner ]; then
          TOKEN=$$(cat /run/secrets/act_runner_token)
          act_runner register --no-interactive \
            --config /etc/act_runner/config.yaml \
            --instance "$$GITEA_INSTANCE_URL" \
            --token "$$TOKEN" \
            --name "$$GITEA_RUNNER_NAME" \
            --labels "$$GITEA_RUNNER_LABELS"
        fi
        exec act_runner daemon --config /etc/act_runner/config.yaml
    depends_on:
      gitea:
        condition: service_healthy
    networks:
      - monitoring
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  renovate:
    image: renovate/renovate:43@sha256:98174f03b4d8db564ced5948e11f4694112d3bfc512dc8e141421905ea65ecc5
    container_name: gateway-renovate
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - RENOVATE_PLATFORM=gitea
      - RENOVATE_ENDPOINT=http://gitea:3000
      - RENOVATE_TOKEN_FILE=/run/secrets/renovate_token
      - RENOVATE_AUTODISCOVER=true
      - LOG_LEVEL=info
    secrets:
      - renovate_token
    depends_on:
      gitea:
        condition: service_healthy
    networks:
      - monitoring
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    profiles:
      - tools

  # --- Deployment (monitor-only — notifies about available updates, does not auto-apply) ---

  watchtower:
    image: containrrr/watchtower:1.7.1@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038
    container_name: gateway-watchtower
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
      - WATCHTOWER_MONITOR_ONLY=true
    tmpfs:
      - /tmp
    volumes:
      # ACCEPTED RISK: Docker socket access required for image update checks.
      # Mitigations: WATCHTOWER_MONITOR_ONLY=true (no auto-updates), read_only
      # filesystem, cap_drop ALL, no-new-privileges.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    labels:
      - "monitoring=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      # scratch/distroless image has no shell — CMD-SHELL unusable.
      # Process liveness is guaranteed by restart: unless-stopped.
      disable: true
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.05'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  caddy_data:
  caddy_config:
  loki-data:
  grafana-data:
  prometheus-data:
  uptime-kuma-data:
  tempo-data:
  promtail-positions:
  gitea-data:
  gitea-repos:
  gitea-db-data:
  act_runner_data:
  arbscanner_data:

networks:
  proxy:
    name: proxy
    driver: bridge
    # Caddy always runs in Docker — apps connect via this network
  monitoring:
    name: monitoring
    driver: bridge

secrets:
  gf_admin_user:
    file: ./secrets/gf_admin_user
  gf_admin_password:
    file: ./secrets/gf_admin_password
  gitea_db_password:
    file: ./secrets/gitea_db_password
  gitea_admin_password:
    file: ./secrets/gitea_admin_password
  renovate_token:
    file: ./secrets/renovate_token
  act_runner_token:
    file: ./secrets/act_runner_token
  kalshi_api_key_id:
    file: ${ARBSCANNER_PATH:-../arbscanner}/secrets/kalshi_api_key_id
  kalshi_private_key:
    file: ${ARBSCANNER_PATH:-../arbscanner}/secrets/kalshi_private_key
