# .pre-commit-config.yaml
repos:
  # --- Secret Scanning ---
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.88.0
    hooks:
      - id: trufflehog
        name: TruffleHog Secret Scan
        entry: trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail
        language: system
        stages: [pre-commit]

  # --- PII / IP Address Scanning ---
  - repo: local
    hooks:
      - id: check-pii
        name: PII Check (IPs, Hostnames)
        entry: scripts/check-pii.sh
        language: system
        stages: [pre-commit]
        pass_filenames: false

  # --- YAML Linting ---
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: YAML Lint
        args: [--strict]

  # --- Shell Script Linting ---
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: ShellCheck
