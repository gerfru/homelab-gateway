# .pre-commit-config.yaml
#
# Hook order (intentional — fail fast on security, then lint):
#   1. TruffleHog — abort immediately if secrets are staged
#   2. PII Check  — catch personal IPs/hostnames before they reach the repo
#   3. YAML Lint  — syntax validation
#   4. ShellCheck — shell script quality
repos:
  # --- Secret Scanning ---
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.88.0
    hooks:
      - id: trufflehog
        name: TruffleHog Secret Scan
        entry: trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail
        language: system
        stages: [pre-commit]

  # --- PII / IP Address Scanning ---
  - repo: local
    hooks:
      - id: check-pii
        name: PII Check (IPs, Hostnames)
        entry: scripts/check-pii.sh
        language: system
        stages: [pre-commit]
        pass_filenames: false

  # --- YAML Linting ---
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: YAML Lint
        args: [--strict]

  # --- Shell Script Linting ---
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: ShellCheck

  # --- Config Validation ---
  - repo: local
    hooks:
      - id: docker-compose-validate
        name: Docker Compose Validate
        entry: >-
          bash -c 'TAILSCALE_IP=100.0.0.1 DOMAIN=home.lab GF_ADMIN_USER=admin
          GF_ADMIN_PASSWORD=test ALERTING_WEBHOOK_URL=http://localhost:9999
          CADDY_AUTH_USER=admin CADDY_AUTH_PASS_HASH=dummy
          docker compose config --quiet'
        language: system
        files: 'docker-compose\.yml$'
        pass_filenames: false

      - id: template-generate-test
        name: Template Generation Test
        entry: bash tests/test-generate.sh
        language: system
        files: '(Caddyfile\.tmpl|dns/.*\.tmpl)$'
        pass_filenames: false
