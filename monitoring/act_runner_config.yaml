log:
  level: info

runner:
  file: /data/.runner
  capacity: 1
  timeout: 3h
  insecure: false
  fetch_timeout: 5s
  fetch_interval: 2s

cache:
  enabled: false

container:
  # Job containers join the monitoring network so they can reach
  # http://gitea:3000 directly without going through Caddy/TLS.
  network: monitoring
  valid_volumes: []
  docker_host: ""
  privileged: false
