global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: caddy
    static_configs:
      - targets: ["caddy:9180"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: promtail
    static_configs:
      - targets: ["promtail:9080"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
