global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: caddy
    static_configs:
      - targets: ["caddy:9180"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: promtail
    static_configs:
      - targets: ["promtail:9080"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: gitea
    static_configs:
      - targets: ["gitea:3000"]

  # Niles AI — scraped through Caddy's internal :9101 endpoint, which injects
  # the X-API-Key header (Niles /metrics is API-key-protected and only reachable
  # via the proxy network that Caddy bridges to). See Caddyfile.tmpl :9101.
  - job_name: niles
    static_configs:
      - targets: ["caddy:9101"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
